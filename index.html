<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title/description also set at runtime from brand.config.js in src/main.jsx
         so they update without a redeploy. Keep these in sync for crawlers. -->
    <title>Shikaz Homes — Nairobi Short Stays</title>
    <meta name="description" content="Luxury short-stay apartments in Nairobi's finest neighbourhoods. Westlands, Kilimani, Karen and more." />
    <!-- Open Graph / WhatsApp / Facebook previews -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shikaz Homes — Nairobi Short Stays" />
    <meta property="og:description" content="Luxury short-stay apartments in Nairobi's finest neighbourhoods. Book direct, pay via M-Pesa." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=1200&q=80" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Shikaz Homes — Nairobi Short Stays" />
    <meta name="twitter:description" content="Luxury short-stay apartments in Nairobi. Book direct, pay via M-Pesa." />
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2?w=1200&q=80" />
    <!-- PWA / Mobile home screen -->
    <meta name="theme-color" content="#0E2B1F" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
